name = "kharon-unified-api"
main = "apps/api/src/index.ts"
compatibility_date = "2026-04-09"
workers_dev = true

[vars]
KHARON_MODE = "production"
NODE_ENV = "production"
SESSION_COOKIE_NAME = "kharon_session"
SESSION_TTL_SECONDS = "28800"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# Configure secrets via `wrangler secret put`
# SESSION_KEYS
# PORTAL_SESSION_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_SERVICE_ACCOUNT_EMAIL
# GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
# WORKBOOK_SPREADSHEET_ID
# GOOGLE_DRIVE_ROOT_FOLDER_ID
# GOOGLE_DOCCARD_TEMPLATE_ID
# GOOGLE_SERVICE_REPORT_TEMPLATE_ID
# GOOGLE_CHAT_WEBHOOK_URL
# GOOGLE_CALENDAR_ID
# GMAIL_SENDER_ADDRESS
# Optional Cloudflare Access verification (recommended when Access is enabled)
# CF_ACCESS_AUD
# CF_ACCESS_JWKS_URL
# CF_ACCESS_ISSUER
# CF_ACCESS_JWKS_JSON
# CF_ACCESS_ENABLED
