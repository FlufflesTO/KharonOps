[build]
  command = "npm run build"
  publish = "dist/public"

[build.environment]
  # These keys are operational config values, not secrets. Their values can legitimately
  # appear in source/build output and should not block deploys.
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,DISPATCH_EMAIL,DEV_BYPASS_TECHNICIAN_ID"

[[redirects]]
  from = "/portal"
  to = "/portal/"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "https://kharon-unified-api.connor-venter.workers.dev/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://kharon-unified-api.connor-venter.workers.dev"

[[headers]]
  for = "/portal/*"
  [headers.values]
    Cache-Control = "no-store"
